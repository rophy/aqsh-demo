apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-federated-auth-reader
  namespace: db-runbooks
---
# Cluster-wide: tokenreview so kube-federated-auth can validate tokens
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-federated-auth-reader
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-federated-auth-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-federated-auth-reader
subjects:
  - kind: ServiceAccount
    name: kube-federated-auth-reader
    namespace: db-runbooks
---
# Namespaced: token creation so kube-federated-auth can renew its token
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-federated-auth-reader
  namespace: db-runbooks
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-federated-auth-reader
  namespace: db-runbooks
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kube-federated-auth-reader
subjects:
  - kind: ServiceAccount
    name: kube-federated-auth-reader
    namespace: db-runbooks
