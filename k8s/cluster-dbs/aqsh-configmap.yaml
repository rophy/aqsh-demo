apiVersion: v1
kind: ConfigMap
metadata:
  name: aqsh-config
  namespace: db-ops
data:
  tasks.yaml: |
    defaults:
      timeout: 5m
      max_retry: 0
      queue: default
    tasks:
      hello:
        script: hello.sh
        allowed_groups: ["system:serviceaccounts"]
        input:
          - name: name
            env: NAME
            required: true
            type: string
      restart:
        script: restart.sh
        description: "Rolling restart of a MariaDB StatefulSet"
        timeout: 5m
        allowed_groups: ["system:serviceaccounts"]
        input:
          - name: namespace
            env: DB_NAMESPACE
            required: true
            type: string
            pattern: '^db-[0-9]+$'
  hello.sh: |
    #!/bin/bash
    set -e
    echo "Hello, $NAME!"
    echo "Task ID: $AQSH_TASK_ID"
    echo "Current time: $(date)"
    sleep 2
    echo "Done!"
    cat > "$AQSH_RESULT_FILE" << EOF
    {
      "greeted": "$NAME",
      "timestamp": "$(date -Iseconds)"
    }
    EOF
  restart.sh: |
    #!/bin/bash
    set -e

    APISERVER="https://kubernetes.default.svc"
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    STS_NAME="mariadb"

    echo "Rolling restart: StatefulSet ${STS_NAME} in namespace ${DB_NAMESPACE}"

    # Patch the StatefulSet pod template to trigger a rolling restart
    RESTART_AT=$(date -Iseconds)
    PATCH="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"${RESTART_AT}\"}}}}}"

    wget -q -O /dev/null \
      --header="Authorization: Bearer ${TOKEN}" \
      --header="Content-Type: application/strategic-merge-patch+json" \
      --method=PATCH \
      --body-data="${PATCH}" \
      --ca-certificate="${CACERT}" \
      "${APISERVER}/apis/apps/v1/namespaces/${DB_NAMESPACE}/statefulsets/${STS_NAME}" \
      2>/dev/null
    HTTP_CODE=$?

    if [ "$HTTP_CODE" != "0" ]; then
      echo "ERROR: Failed to patch StatefulSet (wget exit code: ${HTTP_CODE})"
      exit 1
    fi

    echo "Patch applied at ${RESTART_AT}"

    # Poll rollout status
    echo "Waiting for rollout to complete..."
    for i in $(seq 1 60); do
      STS_JSON=$(wget -q -O - \
        --header="Authorization: Bearer ${TOKEN}" \
        --ca-certificate="${CACERT}" \
        "${APISERVER}/apis/apps/v1/namespaces/${DB_NAMESPACE}/statefulsets/${STS_NAME}" 2>/dev/null)

      REPLICAS=$(echo "$STS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'].get('replicas',0))" 2>/dev/null || echo 0)
      READY=$(echo "$STS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'].get('readyReplicas',0))" 2>/dev/null || echo 0)
      UPDATED=$(echo "$STS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'].get('updatedReplicas',0))" 2>/dev/null || echo 0)

      echo "  replicas=${REPLICAS} ready=${READY} updated=${UPDATED}"

      if [ "$REPLICAS" = "$READY" ] && [ "$REPLICAS" = "$UPDATED" ] && [ "$REPLICAS" != "0" ]; then
        echo "Rollout complete!"
        cat > "$AQSH_RESULT_FILE" << EOF
    {
      "namespace": "${DB_NAMESPACE}",
      "statefulset": "${STS_NAME}",
      "restarted_at": "${RESTART_AT}",
      "replicas": ${REPLICAS}
    }
    EOF
        exit 0
      fi

      sleep 5
    done

    echo "ERROR: Rollout did not complete within timeout"
    exit 1
