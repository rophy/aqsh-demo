defaults:
  timeout: 5m
  max_retry: 0
  queue: mariadb
tasks:
  common/hello:
    script: common/hello.sh
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mariadb/restart.sh
    description: "Rolling restart of a MariaDB StatefulSet"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: sts_name
        env: MARIADB_STS_NAME
        required: false
        type: string
        default: mariadb
      - name: pod_selector
        env: MARIADB_POD_SELECTOR
        required: false
        type: string
        default: app.kubernetes.io/name=mariadb
