apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: db-ops
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: stream-mongo-1
      port: 30092
      targetPort: 30092
      nodePort: 30092
      protocol: TCP
    - name: stream-mariadb-1
      port: 30093
      targetPort: 30093
      nodePort: 30093
      protocol: TCP
    - name: stream-mongo-2
      port: 30094
      targetPort: 30094
      nodePort: 30094
      protocol: TCP
    - name: stream-mariadb-2
      port: 30095
      targetPort: 30095
      nodePort: 30095
      protocol: TCP
    - name: stream-mongo-3
      port: 30096
      targetPort: 30096
      nodePort: 30096
      protocol: TCP
    - name: stream-mariadb-3
      port: 30097
      targetPort: 30097
      nodePort: 30097
      protocol: TCP
