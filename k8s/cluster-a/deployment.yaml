apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-federated-auth
  namespace: aqsh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-federated-auth
  template:
    metadata:
      labels:
        app: kube-federated-auth
    spec:
      serviceAccountName: kube-federated-auth
      containers:
        - name: kube-federated-auth
          image: ghcr.io/rophy/kube-federated-auth:3.2.0
          env:
            - name: CONFIG_PATH
              value: /etc/kube-federated-auth/config/clusters.yaml
            - name: PORT
              value: "8080"
            - name: SECRET_NAME
              value: kube-federated-auth
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/kube-federated-auth/config
              readOnly: true
            - name: ca-certs
              mountPath: /etc/kube-federated-auth/ca-certs
              readOnly: true
            - name: tokens
              mountPath: /etc/kube-federated-auth/tokens
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kube-federated-auth-config
        - name: ca-certs
          configMap:
            name: kube-federated-auth-ca-certs
        - name: tokens
          secret:
            secretName: kube-federated-auth-tokens
