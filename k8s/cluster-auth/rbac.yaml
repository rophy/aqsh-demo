apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-federated-auth
  namespace: db-runbooks
---
# Namespaced: secrets access for credential persistence
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-federated-auth
  namespace: db-runbooks
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-federated-auth
  namespace: db-runbooks
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kube-federated-auth
subjects:
  - kind: ServiceAccount
    name: kube-federated-auth
    namespace: db-runbooks
---
# Cluster-wide: tokenreview for local cluster validation
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-federated-auth-tokenreview
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-federated-auth-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-federated-auth-tokenreview
subjects:
  - kind: ServiceAccount
    name: kube-federated-auth
    namespace: db-runbooks
