apiVersion: v1
kind: ConfigMap
metadata:
  name: aqsh-config
  namespace: aqsh-demo
data:
  tasks.yaml: |
    defaults:
      timeout: 5m
      max_retry: 0
      queue: default
    tasks:
      hello:
        script: hello.sh
        allowed_groups: ["system:serviceaccounts"]
        input:
          - name: name
            env: NAME
            required: true
            type: string
  hello.sh: |
    #!/bin/bash
    set -e
    echo "Hello, $NAME!"
    echo "Task ID: $AQSH_TASK_ID"
    echo "Current time: $(date)"
    sleep 2
    echo "Done!"
    cat > "$AQSH_RESULT_FILE" << EOF
    {
      "greeted": "$NAME",
      "timestamp": "$(date -Iseconds)"
    }
    EOF
